scan_timeout = 100
command_timeout = 500

"$schema" = "https://starship.rs/config-schema.json"

follow_symlinks = false
add_newline = false

format = """
$directory\
${custom.giturl}\
$git_branch\
${custom.git_worktree}\
$git_status\
$line_break\
$character\
"""

right_format = """
$all
"""

# Change this to switch themes (or use `theme` command / Ctrl+F t)
palette = "tokyonight_night"

[directory]
style = "sapphire"
format = "[ $path ]($style)"
truncation_length = 4

[directory.substitutions]
"Documents" = "docs "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
"Developer" = " "
"Projects" = " "

[username]
disabled = true

[line_break]
disabled = true

[character]
disabled = false
success_symbol = "[ ](bold fg:green)"
error_symbol = "[x ](bold fg:red)"
vimcmd_symbol = "[: ](bold fg:yellow)"

[package]
disabled = false

[time]
disabled = true

[custom.giturl]
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$GIT_REMOTE" =~ "github" ]]; then
    GIT_REMOTE_SYMBOL=" "
elif [[ "$GIT_REMOTE" =~ "gitlab" ]]; then
    GIT_REMOTE_SYMBOL=" "
elif [[ "$GIT_REMOTE" =~ "bitbucket" ]]; then
    GIT_REMOTE_SYMBOL=" "
elif [[ "$GIT_REMOTE" =~ "git" ]]; then
    GIT_REMOTE_SYMBOL=" "
else
    GIT_REMOTE_SYMBOL=" "
fi
echo "$GIT_REMOTE_SYMBOL "
"""
when = "git rev-parse --is-inside-work-tree 2> /dev/null"
format = "$output"
require_repo = true
ignore_timeout = true

[git_branch]
symbol = "[](base) "
style = "fg:lavender bg:base"
format = "  [$symbol$branch]($style)[](base)"

[git_status]
format = "[$staged$modified$renamed$conflicted$ahead_behind]($style)"
staged     = "[+${count} ](green)"
modified   = "[!${count} ](yellow)"
renamed    = "[>${count} ](blue)"
deleted    = "[-${count} ](red)"
untracked  = "[?${count} ](sapphire)"
stashed    = "[=${count} ](lavender)"
conflicted = "[x${count} ](red bold)"
ahead      = "[^${count} ](teal)"
behind     = "[v${count} ](peach)"
diverged   = "[^${ahead_count}v${behind_count} ](mauve)"

[custom.git_worktree]
description = "Show indicator when inside a git worktree"
command = """
if git rev-parse --git-dir >/dev/null 2>&1; then
      common_dir=$(git rev-parse --path-format=absolute --git-common-dir 2>/dev/null)
      git_dir=$(git rev-parse --path-format=absolute --git-dir 2>/dev/null)
      if [ "$common_dir" != "$git_dir" ]; then
            echo "wt "
      fi
fi
"""
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = " ([$output ]($style))"
style = "bold green"
require_repo = true
ignore_timeout = true

[os]
disabled = true

[nodejs]
symbol = ""
format = "[ $symbol( $version) ]($style)"

[rust]
symbol = ""
format = "[ $symbol( $version) ]($style)"

[golang]
symbol = ""
format = "[ $symbol( $version) ]($style)"
detect_files = ["go.mod"]

[python]
symbol = ""
format = "[ $symbol( $version) ]($style)"

[docker_context]
symbol = ""
format = "[ $symbol( $context) ]($style)"

[c]
symbol = " "
format = "[ $symbol( $version) ]($style)"

[java]
symbol = " "
format = "[ $symbol( $version) ]($style)"

[php]
symbol = ""
format = "[ $symbol( $version) ]($style)"

