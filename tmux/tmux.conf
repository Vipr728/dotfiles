# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -gq allow-passthrough on

# Start indexing at 1
set -g base-index 1
set -g pane-base-index 1

# Prefix — Ctrl+F
unbind C-b
set-option -g prefix C-f
bind C-f send-prefix

# Don't kill tmux when last session closes — switch to another
set -g detach-on-destroy off

# Reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Splits in current path
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# Copy mode with v
unbind v
bind v copy-mode

# Pane resize with arrow keys
bind -r Down resize-pane -D 5
bind -r Up resize-pane -U 5
bind -r Right resize-pane -R 5
bind -r Left resize-pane -L 5

# Maximize pane
bind -r m resize-pane -Z

# Kill pane without confirm
bind-key w kill-pane

# Mouse
set -g mouse on

# Vi mode for copy
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "~/.config/tmux/clipboard.sh"

# Scroll — enter copy mode already scrolled up
bind-key u copy-mode -u
# Escape exits copy mode (in addition to q)
bind-key -T copy-mode-vi Escape send -X cancel

# Sesh — gum picker (tmux + config sessions only)
bind-key "K" display-popup -E -w 40% "sesh connect \"$(sesh list -t -c | gum filter --limit 1 --placeholder 'Pick session' --prompt='> ')\""

# Sesh — fzf picker (full featured)
bind-key "T" run-shell "sesh connect \"$(
        sesh list --icons | fzf-tmux -p 90%,80% \
        --no-sort --ansi --border-label ' sesh ' --prompt '> ' \
        --header 'C-a all | C-t tmux | C-g conf | C-x zoxide | C-d kill | C-f find' \
        --bind 'tab:down,btab:up' \
        --bind 'ctrl-a:change-prompt(all > )+reload(sesh list --icons)' \
        --bind 'ctrl-t:change-prompt(tmux > )+reload(sesh list -t --icons)' \
        --bind 'ctrl-g:change-prompt(conf > )+reload(sesh list -c --icons)' \
        --bind 'ctrl-x:change-prompt(zox > )+reload(sesh list -z --icons)' \
        --bind 'ctrl-f:change-prompt(find > )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
        --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(del > )+reload(sesh list --icons)' \
        --preview-window 'right:55%' \
        --preview 'sesh preview {}'
)\""

# New session with name prompt
bind-key n command-prompt "new-session -s '%%'"

# Window navigation
bind-key [ previous-window
bind-key ] next-window

# Floating popups
bind-key C-t display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "#{default-shell}"
bind-key C-g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"

# Quick config editor menu
bind d display-menu -T "#[align=centre]Config" -x C -y C \
    ".zshrc"       z  "display-popup -w 85% -h 85% -E 'nvim ~/.zshrc'" \
    ".tmux.conf"   t  "display-popup -w 85% -h 85% -E 'nvim ~/.config/tmux/tmux.conf'" \
    "ghostty"      g  "display-popup -w 85% -h 85% -E 'nvim ~/.config/ghostty/config'" \
    "starship"     s  "display-popup -w 85% -h 85% -E 'nvim ~/.config/starship/starship.toml'" \
    "detach"       d  "detach-client" \
    "quit"         q  ""

# Theme switcher menu
bind-key t display-menu -T "#[align=centre]Theme" -x C -y C \
    "tokyonight" t "run-shell '$HOME/scripts/theme-switch.sh tokyonight'" \
    "rosepine"   r "run-shell '$HOME/scripts/theme-switch.sh rosepine'" \
    "catppuccin" c "run-shell '$HOME/scripts/theme-switch.sh catppuccin'" \
    "gruvbox"    g "run-shell '$HOME/scripts/theme-switch.sh gruvbox'" \
    "kanagawa"   k "run-shell '$HOME/scripts/theme-switch.sh kanagawa'" \
    "monochrome" m "run-shell '$HOME/scripts/theme-switch.sh monochrome'"

# Keymaps help popup
bind-key ? display-popup -w 65% -h 90% -E "~/.config/tmux/keymaps.sh"

# Don't copy on mouse drag end
unbind -T copy-mode-vi MouseDragEnd1Pane

# Plugins
set-environment -g TMUX_PLUGIN_MANAGER_PATH ~/.tmux/plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-battery'

# Resurrect + Continuum
set -g @resurrect-capture-pane-contents "on"
set -g @continuum-restore "on"

# Catppuccin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

# Online status
set -g @online_icon "ok"
set -g @offline_icon "nok"

# Status left — path + zoom (pushed right to avoid notch)
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,|,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_yellow}]#{?window_zoomed_flag,  zoom ,}"

# Status right — session name, battery, time
set -g status-right-length 250
set -g status-right ""
set -ga status-right "#[bg=#{@thm_bg}]#{?#{==:#{online_status},ok},#[fg=#{@thm_rosewater}] 󰖩 ,#[fg=#{@thm_red},bold] 󰖪 }"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]|"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_green}] #{battery_icon} #{battery_percentage} "
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]|"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_peach}] 󰘚 #(~/.config/tmux/cpu.sh) "
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]|"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_mauve}] 󰍛 #(~/.config/tmux/ram.sh) "
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]|"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_blue}] %H:%M "
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]|"
set -ga status-right "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold]  #S },#{#[bg=#{@thm_bg},fg=#{@thm_green}]  #S }}"

# Refresh interval for #() commands (cpu/ram)
set -g status-interval 30

# Status bar position and style
set -g status-position top
set -g status-style "bg=#{@thm_bg}"
set -g status-justify "left"

# Window format
set -wg automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"
set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_overlay_0}"
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_overlay_1}"
set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]|"
set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#{@thm_blue},fg=#{@thm_bg},bold"

# Always keep this last
run '~/.tmux/plugins/tpm/tpm'

# Theme color overrides (after catppuccin sets defaults)
source-file -q ~/.config/tmux/current-theme.conf
